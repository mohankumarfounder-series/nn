name: Cleanup Old Artifacts

on:
  schedule:
    - cron: "0 2 * * *"   # 07:30 IST daily — runs before morning video generation
  workflow_dispatch:       # allow manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write       # needed to delete artifacts

    steps:
      - name: Delete artifacts older than 48 hours
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const cutoff = new Date(Date.now() - 48 * 60 * 60 * 1000);

            let page = 1;
            let deleted = 0;
            let skipped = 0;

            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner, repo, per_page: 100, page
              });

              if (data.artifacts.length === 0) break;

              for (const artifact of data.artifacts) {
                const created = new Date(artifact.created_at);
                if (created < cutoff) {
                  try {
                    await github.rest.actions.deleteArtifact({
                      owner, repo, artifact_id: artifact.id
                    });
                    console.log(`🗑️  Deleted: ${artifact.name} (${(artifact.size_in_bytes/1024/1024).toFixed(1)}MB, created ${artifact.created_at})`);
                    deleted++;
                  } catch (err) {
                    console.log(`⚠️  Could not delete ${artifact.name}: ${err.message}`);
                  }
                } else {
                  skipped++;
                }
              }

              if (data.artifacts.length < 100) break;
              page++;
            }

            console.log(`\n✅ Done — deleted ${deleted} artifact(s), kept ${skipped}`);
