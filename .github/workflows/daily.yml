name: Daily Videos

on:
  schedule:
    - cron: "30 2 * * *"  # 08:00 IST   # 21:33 UTC = 03:03 IST
    - cron: "30 14 * * *"  # 20:00 IST   # 14:03 UTC = 19:33 IST
  workflow_dispatch:
    inputs:
      topic:
        description: "Custom Tamil topic (optional)"
        required: false
      format:
        description: "Format: warning/explainer/rights/comparison/story/news"
        required: false
        default: ""
      slot:
        description: "Slot: morning/evening"
        required: false
        default: "morning"
      upload:
        description: "Upload to YouTube? yes/no"
        required: false
        default: "yes"

permissions:
  contents: write

env:
  GEMINI_KEY:             ${{ secrets.GEMINI_KEY }}
  GITHUB_TOKEN:           ${{ secrets.GH_PAT_TOKEN }}
  GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
  CEREBRAS_API_KEY:       ${{ secrets.CEREBRAS_API_KEY }}
  PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
  YOUTUBE_TOKEN_BASE64:   ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
  CLIENT_SECRETS_BASE64:  ${{ secrets.CLIENT_SECRETS_BASE64 }}

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto fonts-noto-cjk
          pip install --quiet google-genai groq edge-tts openai \
            google-api-python-client google-auth-oauthlib \
            requests beautifulsoup4 Pillow schedule
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "/usr/local/bin"   >> $GITHUB_PATH

      - name: Verify tools
        run: |
          which ffmpeg && ffmpeg -version | head -1
          which edge-tts || echo "WARNING: edge-tts not in PATH"
          python3 -c "import google.genai; print('google-genai OK')"

      - name: Check secrets
        run: |
          echo "GEMINI_KEY set:           ${{ secrets.GEMINI_KEY != '' }}"
          echo "GROQ_API_KEY set:         ${{ secrets.GROQ_API_KEY != '' }}"
          echo "PEXELS_API_KEY set:       ${{ secrets.PEXELS_API_KEY != '' }}"
          echo "YOUTUBE_TOKEN_BASE64 set: ${{ secrets.YOUTUBE_TOKEN_BASE64 != '' }}"
          if [ -z "$GEMINI_KEY" ] && [ -z "$GROQ_API_KEY" ]; then
            echo "ERROR: No LLM key set"; exit 1
          fi

      - name: Detect slot
        id: slot
        run: |
          HOUR=$(date -u +%H)
          INPUT_SLOT="${{ github.event.inputs.slot }}"
          if [ -n "$INPUT_SLOT" ]; then SLOT="$INPUT_SLOT"
          elif [ "$HOUR" -ge 1 ] && [ "$HOUR" -le 6 ]; then SLOT="morning"
          else SLOT="evening"; fi
          echo "slot=$SLOT" >> $GITHUB_OUTPUT
          echo "▶ Slot: $SLOT (UTC hour: $HOUR)"
          if [ "$SLOT" = "morning" ]; then
            echo "preferred_formats=explainer,comparison" >> $GITHUB_OUTPUT
          else
            echo "preferred_formats=warning,story,rights" >> $GITHUB_OUTPUT
          fi

      - name: Setup fallback image
        run: |
          python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (1920,1080), (10,30,60))
          d = ImageDraw.Draw(img)
          d.rectangle([80,400,600,680], fill=(20,50,100))
          d.rectangle([640,200,1840,880], fill=(15,40,80))
          img.save('image.png')
          " || true

      - name: Restore YouTube token
        run: |
          [ -n "$YOUTUBE_TOKEN_BASE64" ] && echo "$YOUTUBE_TOKEN_BASE64" | base64 -d > youtube_token.pickle || true
          [ -n "$CLIENT_SECRETS_BASE64" ] && echo "$CLIENT_SECRETS_BASE64" | base64 -d > client_secrets.json || true


      - name: Debug YouTube token
        run: |
          echo "=== Token check ==="
          echo "YOUTUBE_TOKEN_BASE64 length: $(echo -n "$YOUTUBE_TOKEN_BASE64" | wc -c)"
          if [ -f youtube_token.pickle ]; then
            PICKLE_SIZE=$(wc -c < youtube_token.pickle)
            echo "youtube_token.pickle size: $PICKLE_SIZE bytes"
            if [ "$PICKLE_SIZE" -lt "100" ]; then
              echo "ERROR: pickle file too small ($PICKLE_SIZE bytes) — token corrupt"
              exit 1
            fi
            python3 -c "
import pickle, base64, sys
try:
    c = pickle.load(open('youtube_token.pickle','rb'))
    print('valid=' + str(c.valid))
    print('expired=' + str(c.expired))
    print('has_refresh=' + str(bool(c.refresh_token)))
    if c.expired and c.refresh_token:
        from google.auth.transport.requests import Request
        c.refresh(Request())
        pickle.dump(c, open('youtube_token.pickle','wb'))
        print('TOKEN_REFRESHED=true')
    elif not c.valid and not c.refresh_token:
        print('ERROR: token invalid + no refresh_token. Need local reauth.')
        sys.exit(1)
    else:
        print('TOKEN_OK')
except Exception as e:
    print('DECODE_ERROR=' + str(e))
    sys.exit(1)
"
          else
            echo "ERROR: youtube_token.pickle NOT FOUND after restore step"
            exit 1
          fi

      - name: Generate and upload
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          FORMAT="${{ github.event.inputs.format }}"
          UPLOAD="${{ github.event.inputs.upload }}"
          SLOT="${{ steps.slot.outputs.slot }}"
          PREFERRED="${{ steps.slot.outputs.preferred_formats }}"

          export SLOT_HINT="$SLOT"
          export PREFERRED_FORMATS="$PREFERRED"

          CMD="python3 nidhi_neethi_bot.py --day today"
          [ -n "$TOPIC" ] && CMD="python3 nidhi_neethi_bot.py --topic \"$TOPIC\""
          [ -n "$FORMAT" ] && CMD="$CMD --format $FORMAT"
          [ -f youtube_token.pickle ] && [ "${UPLOAD}" != "no" ] && CMD="$CMD --upload"

          echo "▶ Running: $CMD (slot=$SLOT)"
          # || true prevents workflow failure on LLM errors
          eval $CMD || echo "⚠️ Bot exited with error — video may still be saved"

      - name: Show results
        if: always()
        run: |
          echo "=== Videos ===" && ls -lh videos/    2>/dev/null || echo "none"
          echo "=== Shorts ===" && ls -lh shorts/    2>/dev/null || echo "none"
          echo "=== Scripts ===" && ls -lh scripts/  2>/dev/null || echo "none"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nidhi-neethi-${{ steps.slot.outputs.slot }}-${{ github.run_number }}
          path: |
            videos/
            shorts/
            metadata/
            scripts/
          retention-days: 14
          if-no-files-found: warn
