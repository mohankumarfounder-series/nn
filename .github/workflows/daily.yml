name: Daily Videos

on:
  schedule:
    - cron: "30 3 * * *"   # 09:00 IST — morning prime time
    - cron: "30 15 * * *"  # 21:00 IST — evening prime time
  workflow_dispatch:
    inputs:
      topic:
        description: "Custom Tamil topic (optional)"
        required: false
      format:
        description: "Format: warning/explainer/rights/comparison/story/news/howto/quicktip"
        required: false
        default: ""
      upload:
        description: "Upload to YouTube? yes/no"
        required: false
        default: "yes"

concurrency:
  group: nn-daily
  cancel-in-progress: false

permissions:
  contents: write

env:
  GEMINI_KEY:             ${{ secrets.GEMINI_KEY }}
  GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
  CEREBRAS_API_KEY:       ${{ secrets.CEREBRAS_API_KEY }}
  GITHUB_TOKEN:           ${{ secrets.GH_PAT_TOKEN }}
  GITHUB_MODELS_TOKEN:    ${{ secrets.GH_PAT_TOKEN }}
  PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
  USE_STOCK_VIDEO:        "true"
  YOUTUBE_TOKEN_BASE64:   ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
  CLIENT_SECRETS_BASE64:  ${{ secrets.CLIENT_SECRETS_BASE64 }}
  GITHUB_REPOSITORY:      ${{ github.repository }}

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto fonts-noto-cjk
          pip install --quiet google-genai groq edge-tts openai \
            google-api-python-client google-auth-oauthlib \
            requests beautifulsoup4 Pillow schedule PyNaCl
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "/usr/local/bin"   >> $GITHUB_PATH

      - name: Verify tools
        run: |
          ffmpeg -version | head -1
          edge-tts --version 2>/dev/null || python3 -c "import edge_tts; print('edge_tts OK')"
          python3 -c "import google.genai; print('google-genai OK')"
          if [ -z "$GEMINI_KEY" ] && [ -z "$GROQ_API_KEY" ]; then
            echo "ERROR: No LLM key set"; exit 1
          fi

      - name: Setup fallback image
        run: |
          python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (1920,1080), (10,30,60))
          d = ImageDraw.Draw(img)
          d.rectangle([80,400,600,680], fill=(20,50,100))
          img.save('image.png')
          " || true

      - name: Restore YouTube token
        run: |
          [ -n "$YOUTUBE_TOKEN_BASE64" ] && echo "$YOUTUBE_TOKEN_BASE64" | base64 -d > youtube_token.pickle || true
          [ -n "$CLIENT_SECRETS_BASE64" ] && echo "$CLIENT_SECRETS_BASE64" | base64 -d > client_secrets.json || true

      - name: Validate YouTube token
        run: |
          SZ=$(wc -c < youtube_token.pickle 2>/dev/null || echo 0)
          [ "$SZ" -lt 100 ] && echo "No valid token — generate only" && exit 0
          python3 -c "import pickle; c=pickle.load(open('youtube_token.pickle','rb')); print('valid='+str(c.valid)+' expired='+str(c.expired))" || echo "TOKEN_DECODE_FAILED"

      - name: Generate and upload
        run: |
          set -o pipefail
          TOPIC="${{ github.event.inputs.topic }}"
          FORMAT="${{ github.event.inputs.format }}"
          UPLOAD="${{ github.event.inputs.upload }}"

          if [ -n "$TOPIC" ]; then
            CMD="python3 nidhi_neethi_bot.py --topic \"$TOPIC\""
          else
            CMD="python3 nidhi_neethi_bot.py --day today"
          fi
          [ -n "$FORMAT" ] && CMD="$CMD --format $FORMAT"
          [ -f youtube_token.pickle ] && [ "${UPLOAD}" != "no" ] && CMD="$CMD --upload"

          echo "▶ Running: $CMD"
          eval $CMD 2>&1 | tee /tmp/bot.log
          exit ${PIPESTATUS[0]}

      - name: Show results
        if: always()
        run: |
          echo "=== Videos ===" && ls -lh videos/ 2>/dev/null || echo "none"
          echo "=== Shorts ===" && ls -lh shorts/ 2>/dev/null || echo "none"
          echo "=== Log tail ===" && tail -20 /tmp/bot.log 2>/dev/null || true

      - name: Save log for artifact
        if: always()
        run: |
          mkdir -p logs
          cp /tmp/bot.log logs/bot.log 2>/dev/null || echo "(no log)" > logs/bot.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nn-output-${{ github.run_number }}
          path: |
            videos/
            shorts/
            metadata/
            scripts/
            logs/
          retention-days: 3
          if-no-files-found: ignore
