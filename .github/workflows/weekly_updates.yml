name: Weekly Automation

on:
  schedule:
    - cron: "0 3 * * 0"    # Sunday 8:30 AM IST — update checks + analytics
    - cron: "0 2 * * 3"    # Wednesday 7:30 AM IST — NRI video
    - cron: "30 1 * * 1"   # Monday 7:00 AM IST — community post
    - cron: "0 4 * * *"    # Daily 9:30 AM IST — comment responses
  workflow_dispatch:
    inputs:
      task:
        description: "Task: update-checks / analytics / nri-video / community-post / respond-comments"
        required: true
        default: "update-checks"

permissions:
  contents: write

env:
  GEMINI_KEY:             ${{ secrets.GEMINI_KEY }}
  GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
  PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
  YOUTUBE_TOKEN_BASE64:   ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
  CLIENT_SECRETS_BASE64:  ${{ secrets.CLIENT_SECRETS_BASE64 }}

jobs:
  automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg fonts-noto
          pip install --quiet google-genai groq edge-tts \
            google-api-python-client google-auth-oauthlib \
            requests beautifulsoup4 Pillow
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Restore YouTube token
        run: |
          if [ -n "$YOUTUBE_TOKEN_BASE64" ]; then
            echo "$YOUTUBE_TOKEN_BASE64" | base64 -d > youtube_token.pickle
          fi
          if [ -n "$CLIENT_SECRETS_BASE64" ]; then
            echo "$CLIENT_SECRETS_BASE64" | base64 -d > client_secrets.json
          fi

      - name: Detect and run task
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%u)   # 1=Mon ... 7=Sun
          TASK="${{ github.event.inputs.task }}"

          if [ -n "$TASK" ]; then
            echo "Manual task: $TASK"
          elif [ "$DAY" = "7" ] && [ "$HOUR" = "3" ]; then
            TASK="update-checks analytics"
          elif [ "$DAY" = "3" ] && [ "$HOUR" = "2" ]; then
            TASK="nri-video"
          elif [ "$DAY" = "1" ] && [ "$HOUR" = "1" ]; then
            TASK="community-post"
          else
            TASK="respond-comments"
          fi

          echo "Running: $TASK"
          for t in $TASK; do
            echo "--- Task: $t ---"
            python3 nidhi_neethi_bot.py --$t || echo "Task $t failed, continuing..."
          done

      - name: Commit updated data files
        run: |
          git config user.email "bot@nidhineethitamil.com"
          git config user.name  "Nidhi Neethi Bot"
          git add update_checks.json video_series.json \
                  analytics_insights.json responded_comments.json \
                  community_posts/ used_topics.txt || true
          git diff --staged --quiet || \
            git commit -m "chore: weekly automation $(date +%Y-%m-%d)"
          git push || echo "Nothing to push"

      - name: Show results
        if: always()
        run: |
          echo "=== Analytics ===" && cat analytics_insights.json 2>/dev/null || true
          echo "=== Series ===" && cat video_series.json 2>/dev/null || true
          echo "=== Community posts ===" && ls community_posts/ 2>/dev/null || true
          echo "=== Thumbnails ===" && ls thumbnails/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-outputs-${{ github.run_number }}
          path: |
            thumbnails/
            community_posts/
            analytics_insights.json
          retention-days: 30
